<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | Arsenal Operacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Fundo do Arsenal com Mockup14 Desfocado */
        .arsenal-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('mockup14.png') no-repeat center center;
            background-size: cover; filter: blur(8px); transform: scale(1.1); z-index: -1;
        }

        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--white); overflow-x: hidden; }

        /* Header Simplificado (Apenas Ícone) */
        header {
            background: rgba(0,0,0,0.95); padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 75px; 
            border-bottom: 2px solid var(--gold);
        }
        .logo { display: flex; align-items: center; }
        .logo img { height: 50px; width: auto; } /* Apenas o ícone/logo sem o selo textual */

        nav ul { list-style: none; display: flex; gap: 15px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* Grid da Biblioteca Arsenal */
        .arsenal-grid {
            max-width: 1200px; margin: 120px auto 50px; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px; position: relative; z-index: 10;
        }

        .product-card {
            text-align: center; transition: transform 0.4s ease; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-15px) scale(1.05); }

        /* Imagem Ampliada conforme Checkpoint */
        .product-card img {
            width: 320px; height: 450px; object-fit: contain; /* Proporção ampliada */
            background: transparent; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* Estrelas de Classificação */
        .stars { color: var(--gold); margin-top: 5px; font-size: 1.2rem; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        .section-title {
            text-align: center; color: var(--gold); font-size: 2rem; 
            text-transform: uppercase; margin-top: 100px; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="arsenal-bg"></div>

    <header>
        <div class="logo">
            <img src="selo.jpg" alt="Portal Pleno"> </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#arsenal">Arsenal</a></li>
                <li><a href="audiobooks.html">Audiobooks</a></li>
                <li><a href="ebooks.html">Ebooks</a></li>
                <li><a href="avaliacao.html">Avaliação</a></li>
                <li><a href="degustacao.html">Degustação</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <h2 class="section-title">Biblioteca Operacional</h2>

    <div class="arsenal-grid">
        <div class="product-card" onclick="location.href='descubra.html'">
            <img src="mockup03.png" alt="Descubra Você">
            <div class="stars">★★★★★</div>
        </div>

        <div class="product-card" onclick="location.href='autopsia-en.html'">
            <img src="audio04.png" alt="Autopsy of Personality">
            <div class="stars">★★★★★</div>
        </div>
        
        </div>

</body>
</html>
