<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; --card-bg: rgba(26, 26, 26, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { min-height: 100%; background-color: #000; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; color: var(--white); }

        /* BACKDROP SOBERANO - AJUSTE DE BRILHO */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('capa.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* HEADER UNIFICADO */
        header {
            background: #000; padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; 
            border-bottom: 2px solid var(--gold);
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; width: auto; } 
        .logo span { font-weight: 700; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* CONTEÚDO */
        .main-content { position: relative; z-index: 10; padding-top: 85px; }
        
        .hero-section { height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 5%; }
        .hero-center h1 { font-family: 'Playfair Display', serif; font-size: 3rem; text-transform: uppercase; margin: 5px 0; }
        .line-hero { width: 100%; max-width: 600px; height: 6px; background: var(--gold); margin: 15px auto; }

        /* ARSENAL - ALTA DENSIDADE */
        .arsenal-section { padding: 0 5% 50px; background: transparent; }
        .arsenal-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; }
        
        .column-title { 
            font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); 
            margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; 
        }

        /* CARROSSEL INTERATIVO */
        .carousel-track { width: 100%; overflow: hidden; position: relative; backdrop-filter: blur(5px); border-radius: 8px; }
        .carousel-inner { display: flex; animation: scroll-arsenal 21s linear infinite; } /* 6 itens * 3.5s */
        .carousel-inner:hover { animation-play-state: paused; }

        .product-card { 
            min-width: 220px; margin-right: 15px; background: var(--card-bg); 
            border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 4px; 
            transition: 0.4s; text-decoration: none; 
        }
        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .card-img { height: 300px; padding: 15px; display: flex; align-items: center; justify-content: center; }
        .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8)); }

        @keyframes scroll-arsenal {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Ajustado para loop com duplicatas */
        }
    </style>
</head>

</html>
