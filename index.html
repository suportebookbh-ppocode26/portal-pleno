<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; color: var(--white); }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('capa.jpg') no-repeat center center;
            background-size: cover; z-index: 1; transition: 0.8s ease-in-out;
        }

        header {
            background: #000; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; border-bottom: 2px solid var(--gold);
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; width: auto; } 
        .logo span { font-weight: 700; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .main-container {
            height: 100vh; display: flex; justify-content: space-between;
            align-items: center; padding: 0 3%; position: relative; z-index: 10;
        }

        .hero-center { flex: 2; text-align: center; max-width: 600px; padding: 0 10px; transition: 0.5s; }
        .hero-center h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 3vw, 3.2rem); text-transform: uppercase; text-shadow: 2px 2px 30px #000; line-height: 1.1; }
        .line-hero { width: 100%; height: 6px; background: var(--gold); margin: 15px 0; box-shadow: 0 0 25px var(--gold); }

        .product-window { width: 300px; display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.5s; }
        .window-title { color: var(--gold); font-size: 1.2rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; position: absolute; top: -40px; z-index: 100; text-shadow: 2px 2px 10px #000; }

        .display-box { width: 100%; height: 500px; position: relative; }
        .display-box a { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.5s ease-in-out; animation: fadeLoop 18s infinite; }
        .display-box img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 15px 25px #000); }

        @keyframes fadeLoop { 0%, 16.66% { opacity: 1; z-index: 20; } 22.22%, 100% { opacity: 0; z-index: 1; } }
        .display-box a:nth-child(1) { animation-delay: 0s; }
        .display-box a:nth-child(2) { animation-delay: 3s; }
        .display-box a:nth-child(3) { animation-delay: 6s; }
        .display-box a:nth-child(4) { animation-delay: 9s; }
        .display-box a:nth-child(5) { animation-delay: 12s; }
        .display-box a:nth-child(6) { animation-delay: 15s; }

        footer {
            position: fixed; bottom: 0; width: 100%; padding: 25px;
            text-align: center; background: rgba(0,0,0,0.95); z-index: 1000;
            border-top: 2px solid var(--gold);
        }
        .footer-main { 
            color: var(--white); font-weight: 700; text-transform: uppercase; 
            font-size: 0.9rem; text-decoration: none; transition: 0.3s;
            display: inline-block; letter-spacing: 1px;
        }
        .footer-main span { display: block; font-size: 0.7rem; color: var(--gold); margin-top: 5px; font-weight: 400; text-transform: none; }
        .footer-main:hover { transform: scale(1.05); text-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

    <div id="bg-soberano" class="bg-layer"></div>

    <header>
        <div class="logo"><img src="selo.jpg"><span>Portal Pleno O Código</span></div>
        <nav>
            <ul>
                <li><a onclick="updateUI('home', 'capa.jpg')">Início</a></li>
                <li><a href="arsenal.html">Arsenal</a></li>
                <li><a onclick="updateUI('ebooks', 'mockup13.jpg')">Ebooks</a></li>
                <li><a onclick="updateUI('audios', 'capa.jpg')">Audiobooks</a></li>
                <li><a href="degustacao.html">Degustação</a></li>
                <li><a href="avaliacoes.html">Avaliações</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <div id="col-ebooks" class="product-window">
            <div class="window-title">Ebooks</div>
            <div class="display-box">
                <a href="arsenal.html"><img src="ebook01.png"></a>
                <a href="arsenal.html"><img src="ebook02.png"></a>
                <a href="arsenal.html"><img src="ebook03.png"></a>
                <a href="arsenal.html"><img src="ebook04.png"></a>
                <a href="arsenal.html"><img src="ebook05.png"></a>
                <a href="arsenal.html"><img src="ebook06.png"></a>
            </div>
        </div>

        <div id="hero" class="hero-center">
            <h1>O CONFORTO É UMA PRISÃO</h1>
            <div class="line-hero"></div>
            <h1>O CÓDIGO É A CHAVE</h1>
        </div>

        <div id="col-audios" class="product-window">
            <div class="window-title">Audiobooks</div>
            <div class="display-box">
                <a href="arsenal.html"><img src="audio01.png"></a>
                <a href="arsenal.html"><img src="audio02.png"></a>
                <a href="arsenal.html"><img src="audio03.png"></a>
                <a href="arsenal.html"><img src="audio04.png"></a>
                <a href="arsenal.html"><img src="audio05.png"></a>
                <a href="arsenal.html"><img src="audio06.png"></a>
            </div>
        </div>
    </main>

    <footer>
        <a href="arsenal.html" class="footer-main">
            Acesse os protocolos de Engenharia de Colisão e Soberania Mental
            <span>tome o controle total dos seus sentimentos</span>
        </a>
    </footer>

    <script>
        function updateUI(mode, img) {
            document.getElementById('bg-soberano').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('${img}')`;
            const hero = document.getElementById('hero');
            const ebooks = document.getElementById('col-ebooks');
            const audios = document.getElementById('col-audios');
            
            hero.style.opacity = (mode === 'home') ? '1' : '0.1';
            ebooks.style.opacity = (mode === 'audios') ? '0.2' : '1';
            audios.style.opacity = (mode === 'ebooks') ? '0.2' : '1';
        }
    </script>
</body>
</html>
