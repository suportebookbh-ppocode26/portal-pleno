<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; --card-bg: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { min-height: 100%; background-color: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; color: var(--white); }

        /* BACKDROP SOBERANO */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('capa.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* HEADER UNIFICADO */
        header {
            background: #000; padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; 
            border-bottom: 2px solid var(--gold);
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; width: auto; } 
        .logo span { font-weight: 700; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* CONTEÚDO */
        .main-content { position: relative; z-index: 10; padding-top: 100px; }
        
        .hero-section { height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 5%; }
        .hero-center h1 { font-family: 'Playfair Display', serif; font-size: 3rem; text-transform: uppercase; margin: 10px 0; }
        .line-hero { width: 100%; max-width: 600px; height: 6px; background: var(--gold); margin: 20px auto; }

        /* ARSENAL */
        .arsenal-section { padding: 80px 5%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); }
        .arsenal-title { font-family: 'Playfair Display', serif; font-size: 3rem; text-align: center; margin-bottom: 50px; text-transform: uppercase; color: var(--gold); }
        .arsenal-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card-img { height: 350px; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 20px; text-align: center; }
        .card-info h2 { font-size: 1rem; color: var(--gold); margin-bottom: 10px; }
        .card-price { font-size: 1.2rem; font-weight: 700; color: #fff; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    
    <header>
        <div class="logo">
            <img src="selo.jpg" alt
