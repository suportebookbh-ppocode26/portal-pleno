<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código (Soberano)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; --red-combo: #cc0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background-color: var(--bg); font-family: 'Inter', sans-serif; overflow: hidden; scroll-behavior: smooth; }

        /* Background Dinâmico */
        .bg-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('capa.png') no-repeat center center; 
            background-size: cover; z-index: 1; transition: background 0.5s ease, filter 0.8s; 
            filter: brightness(0.5); 
        }
        
        header { 
            background: #000; padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; 
            border-bottom: 2px solid var(--gold); 
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; width: auto; } 
        .logo span { font-weight: 700; text-transform: uppercase; font-size: 1.1rem; color: #fff; letter-spacing: 1px; }
        
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
        nav a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .main-container { 
            height: 100vh; display: flex; justify-content: space-between;
            align-items: center; padding: 0 3%; position: relative; z-index: 10; 
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .hero-home { flex: 2; text-align: center; max-width: 600px; padding: 0 10px; }
        .hero-home h1 { 
            color: var(--white); font-size: clamp(1rem, 2.2vw, 2.5rem); 
            text-shadow: 2px 2px 30px #000; text-transform: uppercase; 
            font-weight: 700; line-height: 1.2; letter-spacing: 2px;
        }
        .line-hero { width: 100%; height: 6px; background: var(--gold); margin: 15px 0; box-shadow: 0 0 25px var(--gold); }

        .product-window { width: 280px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .window-title { 
            color: var(--gold); font-size: 0.85rem; letter-spacing: 5px; text-transform: uppercase; 
            font-weight: 700; position: absolute; top: 60px; z-index: 100; text-shadow: 2px 2px 10px #000;
        }

        .display-box { width: 100%; height: 480px; position: relative; cursor: pointer; }
        .display-box a {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            animation: fadeLoop 18s infinite;
        }
        .display-box img { width: 100%; height: 100%; object-fit: contain; animation: float 6s ease-in-out infinite; }

        @keyframes fadeLoop {
            0%, 16.66% { opacity: 1; z-index: 20; }
            22.22%, 100% { opacity: 0; z-index: 1; }
        }

        .display-box a:nth-child(1) { animation-delay: 0s; }
        .display-box a:nth-child(2) { animation-delay: 3s; }
        .display-box a:nth-child(3) { animation-delay: 6s; }
        .display-box a:nth-child(4) { animation-delay: 9s; }
        .display-box a:nth-child(5) { animation-delay: 12s; }
        .display-box a:nth-child(6) { animation-delay: 15s; }

        /* Seções Escondidas */
        #titulos-section, #sinopse-section { 
            width: 100%; display: none; padding: 120px 5% 50px; 
            overflow-y: auto; height: 100vh; position: absolute; top: 0; left: 0; z-index: 50;
        }

        .titulos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; width: 100%; max-width: 1400px; margin: 0 auto; }
        .card-titulo { text-align: center; cursor: pointer; transition: 0.3s; }
        .card-titulo img { width: 100%; height: 320px; object-fit: contain; animation: float 6s ease-in-out infinite; }
        .card-titulo:hover img { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--gold)); }
        
        .sinopse-container { display: grid; grid-template-columns: 1fr 1.5fr 300px; gap: 50px; max-width: 1600px; margin: 0 auto; }
        .sinopse-media img { width: 100%; animation: float 8s ease-in-out infinite; }
        .sinopse-text { color: var(--white); line-height: 1.8; }
        .sinopse-text h2 { font-size: 2.2rem; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        
        .sinopse-options { background: #111; border: 1px solid rgba(255,215,0,0.2); padding: 30px 20px; border-radius: 5px; height: fit-content; text-align: center; }
        .price-main { color: var(--white); font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; }
        .btn-sinopse { width: 100%; padding: 15px; text-transform: uppercase; font-weight: 700; font-size: 0.7rem; border-radius: 3px; cursor: pointer; display: block; margin-bottom: 10px; border: none; text-decoration: none; text-align: center; }
        .btn-cart { background: var(--gold); color: #000; }
        .btn-buy { background: #fff; color: #000; }
        .btn-combo { background: var(--red-combo); color: #fff; }

        footer { position: fixed; bottom: 0; width: 100%; padding: 15px; text-align: center; background: rgba(0,0,0,0.9); z-index: 1000; border-top: 1px solid rgba(255,215,0,0.1); }
        .footer-main { color: var(--white); font-weight: 700; text-transform: uppercase; font-size: 0.7rem; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bg" class="bg-layer"></div>
    <header>
        <div class="logo"><img src="selo.png"><span>Portal Pleno O Código</span></div>
        <nav>
            <ul>
                <li><a onclick="showHome()">Início</a></li>
                <li><a onclick="showTitulos()">Títulos</a></li>
                <li><a href="degustacao.html">Degustação</a></li>
                <li><a href="avaliacoes.html">Avaliações</a></li>
                <li><a href="sobre.html">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" class="main-container">
        <div id="left-col" class="product-window">
            <div class="window-title">Ebooks</div>
            <div class="display-box">
                <a onclick="loadSinopse('ebook', 0)"><img src="capa.png"></a>
                <a onclick="loadSinopse('ebook', 1)"><img src="capa.png"></a>
                <a onclick="loadSinopse('ebook', 2)"><img src="capa.png"></a>
                <a onclick="loadSinopse('ebook', 3)"><img src="capa.png"></a>
                <a onclick="loadSinopse('ebook', 4)"><img src="capa.png"></a>
                <a onclick="loadSinopse('ebook', 5)"><img src="capa.png"></a>
            </div>
        </div>

        <div id="home-content" class="hero-home">
            <h1>O CONFORTO É UMA PRISÃO</h1>
            <div class="line-hero"></div>
            <h1>O CÓDIGO É A CHAVE</h1>
        </div>

        <div id="right-col" class="product-window">
            <div class="window-title">Audiobooks</div>
            <div class="display-box">
                <a onclick="loadSinopse('audio', 0)"><img src="audio02.png"></a>
                <a onclick="loadSinopse('audio', 1)"><img src="audio04.png"></a>
                <a onclick="loadSinopse('audio', 2)"><img src="audio06.png"></a>
                <a onclick="loadSinopse('audio', 3)"><img src="audio08.png"></a>
                <a onclick="loadSinopse('audio', 4)"><img src="audio10.png"></a>
                <a onclick="loadSinopse('audio', 5)"><img src="audio12.png"></a>
            </div>
        </div>

        <div id="titulos-section">
            <div class="titulos-grid" id="grid-container"></div>
        </div>

        <div id="sinopse-section">
            <div class="sinopse-container">
                <div class="sinopse-media"><img id="sinopse-img" src=""></div>
                <div class="sinopse-text">
                    <h2 id="sinopse-title"></h2>
                    <span style="color:var(--gold); font-size: 0.8rem; text-transform: uppercase;">Por Júlio Bhrósz</span>
                    <div id="sinopse-desc" style="margin-top:20px; color: #ccc;"></div>
                </div>
                <div class="sinopse-options">
                    <div id="sinopse-price" class="price-main"></div>
                    <button class="btn-sinopse btn-cart">Adicionar ao Carrinho</button>
                    <a id="buy-link" href="#" target="_blank" class="btn-sinopse btn-buy">Comprar Agora</a>
                    <button class="btn-sinopse btn-combo">Combo Coletânea</button>
                </div>
            </div>
        </div>
    </main>

    <footer><a onclick="showTitulos()" class="footer-main">Acesse o Arsenal de Soberania Mental</a></footer>

    <script>
        const produtos = {
            ebook: [
                { t: 'Descubra Você', img: 'capa.png', link: 'https://pay.kiwify.com.br/lDiv2Do', preco: '49,90', desc: 'Desvende sua essência e floresça em conexões autênticas.' },
                { t: 'Engenharia da Colisão', img: 'capa.png', link: 'https://pay.kiwify.com.br/PmaKDGV', preco: '67,00', desc: 'O protocolo visceral para o controle das emoções.' },
                { t: 'Autópsia da Personalidade', img: 'capa.png', link: 'https://pay.kiwify.com.br/nJO91Ia', preco: '97,00', desc: 'A análise técnica da supremacia mental.' },
                { t: 'Código Soberano', img: 'capa.png', link: '#', preco: '49,90', desc: 'Domínio total sobre o software humano.' },
                { t: 'Hardware Mental', img: 'capa.png', link: '#', preco: '49,90', desc: 'A reestruturação biológica do foco.' },
                { t: 'Know Yourself First', img: 'capa.png', link: '#', preco: '49,90', desc: 'International protocol for self-mastery.' }
            ],
            audio: [
                { t: 'Audiobook: Descubra Você', img: 'audio02.png', link: 'https://pay.kiwify.com/ilgU4Kg', preco: '29,90', desc: 'A jornada de jardinagem interior em áudio.' },
                { t: 'Audiobook: Engenharia da Colisão', img: 'audio04.png', link: 'https://pay.kiwify.com.br/lDiv2Do', preco: '37,00', desc: 'Frequências de impacto emocional.' },
                { t: 'Audiobook: Autópsia', img: 'audio06.png', link: 'https://pay.kiwify.com.br/PmaKDGV', preco: '47,00', desc: 'Desconstrução audível do ego.' },
                { t: 'Audiobook: Protocolo 04', img: 'audio08.png', link: 'https://pay.kiwify.com.br/nJO91Ia', preco: '29,90', desc: 'Sincronização neural avançada.' },
                { t: 'Audiobook: Protocolo 05', img: 'audio10.png', link: 'https://pay.kiwify.com/2LTHnl0', preco: '29,90', desc: 'Engenharia de som e soberania.' },
                { t: 'Audiobook: Protocolo 06', img: 'audio12.png', link: 'https://pay.kiwify.com/TGmTjRA', preco: '29,90', desc: 'O veredicto final em formato audível.' }
            ]
        };

        function initGrid() {
            const container = document.getElementById('grid-container');
            [...produtos.ebook, ...produtos.audio].forEach((p, i) => {
                const tipo = i < 6 ? 'ebook' : 'audio';
                const idx = i < 6 ? i : i - 6;
                container.innerHTML += `
                    <div class="card-titulo" onclick="loadSinopse('${tipo}', ${idx})">
                        <img src="${p.img}">
                        <div style="color:var(--gold); margin-top:10px; font-size:0.7rem;">★★★★★</div>
                        <div style="color:#fff; font-size:0.6rem; text-transform:uppercase; margin-top:5px;">${p.t}</div>
                    </div>`;
            });
        }

        function hideAll() {
            ['home-content', 'left-col', 'right-col', 'titulos-section', 'sinopse-section'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function showHome() {
            hideAll();
            document.getElementById('home-content').style.display = 'block';
            document.getElementById('left-col').style.display = 'flex';
            document.getElementById('right-col').style.display = 'flex';
            document.getElementById('main-content').style.flexDirection = 'row';
            const bg = document.getElementById('bg');
            bg.style.background = "url('capa.png') no-repeat center center";
            bg.style.backgroundSize = "cover";
            bg.style.filter = 'brightness(0.5)';
        }

        function showTitulos() {
            hideAll();
            document.getElementById('titulos-section').style.display = 'block';
            document.getElementById('main-content').style.flexDirection = 'column';
            const bg = document.getElementById('bg');
            bg.style.background = "url('banner.png') no-repeat center center";
            bg.style.backgroundSize = "cover";
            bg.style.filter = 'brightness(0.2) blur(8px)';
        }

        function loadSinopse(tipo, idx) {
            hideAll();
            const p = produtos[tipo][idx];
            document.getElementById('sinopse-img').src = p.img;
            document.getElementById('sinopse-title').innerText = p.t;
            document.getElementById('sinopse-desc').innerHTML = `<p>${p.desc}</p>`;
            document.getElementById('sinopse-price').innerText = `R$ ${p.preco}`;
            document.getElementById('buy-link').href = p.link;
            document.getElementById('sinopse-section').style.display = 'block';
            document.getElementById('main-content').style.flexDirection = 'column';
            
            const bg = document.getElementById('bg');
            bg.style.background = "url('banner.png') no-repeat center center";
            bg.style.backgroundSize = "cover";
            bg.style.filter = 'brightness(0.1) blur(10px)';
        }

        initGrid();
    </script>
</body>
</html>
