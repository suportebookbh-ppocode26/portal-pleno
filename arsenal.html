<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | Arsenal Operacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; --red-btn: #C00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { min-height: 100vh; background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--white); overflow-x: hidden; }

        /* Fundo Mockup14 Desfocado */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('mockup14.png') no-repeat center center;
            background-size: cover; filter: blur(15px); z-index: -1; transform: scale(1.1);
        }

        header {
            background: #000; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; border-bottom: 2px solid var(--gold);
        }
        .logo img { height: 50px; width: auto; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        /* VITRINE ARSENAL */
        .arsenal-container { max-width: 1200px; margin: 120px auto 50px; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 40px; }
        .product-card { text-align: center; cursor: pointer; transition: transform 0.4s; }
        .product-card:hover { transform: translateY(-15px); }
        .product-card img { width: 100%; height: auto; max-height: 350px; object-fit: contain; filter: drop-shadow(0 10px 15px #000); }
        .stars { color: var(--gold); font-size: 1.2rem; margin-top: 5px; }

        /* ABA DE SINOPSE (3 COLUNAS - FUNDO CLARO) */
        #sinopse-overlay {
            display: none; position: fixed; top: 85px; left: 0; width: 100%; height: calc(100vh - 85px);
            background: #f4f4f4; color: #333; z-index: 2000; padding: 40px 5%; overflow-y: auto;
        }
        .sinopse-columns { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 40px; max-width: 1300px; margin: 0 auto; }
        .col-left img { width: 100%; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); }
        .col-center h1 { font-size: 2.5rem; color: #000; margin-bottom: 5px; text-transform: uppercase; }
        .col-center .author { color: var(--gold); font-weight: 700; margin-bottom: 30px; text-transform: uppercase; font-size: 0.9rem; }
        .col-center p { font-size: 1.1rem; line-height: 1.6; color: #444; margin-bottom: 20px; text-align: justify; }
        .col-center .sinopse-label { font-weight: 700; color: #888; text-transform: uppercase; border-top: 1px solid #ddd; padding-top: 20px; margin-top: 30px; }
        .col-right { background: #333; border-radius: 8px; padding: 30px 20px; color: #fff; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .price-label { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; font-weight: 700; }
        .price-value { font-size: 2.2rem; font-weight: 700; margin: 5px 0 20px; }
        .btn-stack { display: flex; flex-direction: column; gap: 8px; }
        .btn-yellow { background: var(--gold); color: #000; padding: 12px; font-weight: 700; text-decoration: none; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; border: none; cursor: pointer; }
        .btn-red { background: var(--red-btn); color: #fff; padding: 12px; font-weight: 700; text-decoration: none; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase; }
        .close-link { display: block; margin-top: 30px; color: #888; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; text-decoration: underline; }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<header>
    <div class="logo"><img src="selo.jpg"></div>

<div id="sinopse-overlay">
    <div class="sinopse-columns">
        <div class="col-left" id="display-mockup"></div>
        <div class="col-center">
            <h1 id="display-title">TÍTULO</h1>
            <div class="author">POR JÚLIO BHRÓSZ</div>
            <p id="display-desc">Descrição do produto...</p>
            <div class="sinopse-label">SINOPSE</div>

                <a href="#" class="btn-red">COMBO COLETÂNEA</a>
            </div>
        </div>
    </div>
</div>

<script>
    function openSinopse(img, title, desc, price) {
        document.getElementById('sinopse-overlay').style.display = 'block';
        document.getElementById('vitrine-grid').style.display = 'none';
        document.getElementById('display-mockup').innerHTML = '<img src="' + img + '">';
        document.getElementById('display-title').innerText = title;
        document.getElementById('display-desc').innerText = desc;
        document.getElementById('display-price').innerText = price;
        window.scrollTo(0,0);
    }
    function closeSinopse() {
        document.getElementById('sinopse-overlay').style.display = 'none';
        document.getElementById('vitrine-grid').style.display = 'grid';
    }
</script>

</body>
</html>
